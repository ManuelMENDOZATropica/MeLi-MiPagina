version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tropica_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tropica_builder
    ports:
      - "5432:5432"
    volumes:
      - tropica_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  tropica_pgdata:
